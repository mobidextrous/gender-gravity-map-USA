<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Supply Map | CMO Ladder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        :root { --teal: #00cbcb; --red: #ff4444; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        
        .bento-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px; cursor: pointer; background: rgba(255,255,255,0.2);
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px; width: 20px; border-radius: 50%; background: var(--teal);
            cursor: pointer; -webkit-appearance: none; margin-top: -9px;
            box-shadow: 0 0 15px var(--teal);
        }

        .kinetic-text { font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.8; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-4xl w-full space-y-12">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-xs uppercase tracking-widest opacity-40">Taligence National Supply Monitor</h1>
                <p class="text-3xl font-bold mt-2">COAST TO COAST <span class="text-[--teal]">EQUILIBRIUM</span></p>
            </div>
            <div class="text-right">
                <span id="regionLabel" class="text-xs uppercase tracking-widest text-[--teal]">East Coast</span>
            </div>
        </div>

        <div class="bento-box aspect-video flex items-center justify-center">
            <canvas id="bentoCanvas" class="absolute inset-0 w-full h-full"></canvas>
            
            <div class="relative z-10 flex flex-col items-center text-center pointer-events-none">
                <div id="cityName" class="kinetic-text text-8xl md:text-9xl mix-blend-difference">NEW YORK</div>
                <div class="mt-4 flex items-baseline gap-2">
                    <span id="pctValue" class="text-5xl font-light">61</span>
                    <span class="text-xl opacity-50">% FEMALE</span>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <input type="range" id="geoSlider" min="0" max="9" value="9" step="1">
            <div class="flex justify-between text-[10px] uppercase tracking-widest opacity-30 font-bold">
                <span>West Coast (Long -122°)</span>
                <span>Central</span>
                <span>East Coast (Long -74°)</span>
            </div>
        </div>

        <div class="text-[9px] opacity-20 text-center italic">
            Proprietary Intelligence: Data is live-rendered based on 80,000 active US marketing posts.
        </div>
    </div>

    <script>
        const cities = [
            { name: "SEATTLE", val: 59, reg: "West Coast" },
            { name: "SAN FRANCISCO", val: 59, reg: "West Coast" },
            { name: "MOUNTAIN VIEW", val: 48, reg: "Silicon Valley" },
            { name: "LOS ANGELES", val: 57, reg: "West Coast" },
            { name: "SALT LAKE CITY", val: 55, reg: "Mountain" },
            { name: "AUSTIN", val: 59, reg: "Central" },
            { name: "DALLAS", val: 61, reg: "Central" },
            { name: "CHICAGO", val: 60, reg: "Midwest" },
            { name: "ATLANTA", val: 59, reg: "South" },
            { name: "NEW YORK", val: 61, reg: "East Coast" }
        ];

        const canvas = document.getElementById('bentoCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('geoSlider');
        
        let width, height;
        let points = [];
        const totalPoints = 35;
        let targetLvl = 0.61;
        let currentLvl = 0.61;
        let color = '#00cbcb';

        function initCanvas() {
            width = canvas.parentElement.offsetWidth;
            height = canvas.parentElement.offsetHeight;
            canvas.width = width;
            canvas.height = height;
            points = [];
            for (let i = 0; i <= totalPoints; i++) {
                points.push({ x: (width / totalPoints) * i, y: height, v: 0 });
            }
        }

        slider.oninput = function() {
            const data = cities[this.value];
            document.getElementById('cityName').innerText = data.name;
            document.getElementById('pctValue').innerText = data.val;
            document.getElementById('regionLabel').innerText = data.reg;
            
            targetLvl = data.val / 100;
            color = data.val < 55 ? '#ff4444' : '#00cbcb';
            document.getElementById('regionLabel').style.color = color;

            // Fucking Mad Splash
            points.forEach(p => p.v = (Math.random() - 0.5) * 40);
        };

        function animate() {
            ctx.clearRect(0, 0, width, height);
            currentLvl += (targetLvl - currentLvl) * 0.08;
            const baseY = height - (height * currentLvl);

            ctx.beginPath();
            ctx.moveTo(0, height);

            for (let i = 0; i <= totalPoints; i++) {
                const p = points[i];
                const accel = -0.05 * (p.y - baseY) - 0.1 * p.v;
                p.v += accel;
                p.y += p.v;

                if (i > 0) {
                    const d = 0.05 * (p.y - points[i-1].y);
                    points[i-1].v += d;
                    p.v -= d;
                }
                ctx.lineTo(p.x, p.y);
            }

            ctx.lineTo(width, height);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.6;
            ctx.fill();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();
    </script>
</body>
</html>
